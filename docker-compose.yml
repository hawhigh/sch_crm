version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: talkin_crm_app
    restart: unless-stopped
    ports:
      - "3033:3033"
    environment:
      NODE_ENV: production
      PORT: 3033
      DATABASE_URL: postgres://postgres:postgres@db:5432/talkin_crm
      JWT_SECRET: ${JWT_SECRET:-talkin-crm-secret-key-123}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - talkin_network

  db:
    image: postgres:15-alpine
    container_name: talkin_crm_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: talkin_crm
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - talkin_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  talkin_network:
    driver: bridge

volumes:
  pgdata:
